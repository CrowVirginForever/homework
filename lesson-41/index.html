<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/style.css" />
        <title>Форма</title>
    </head>
    <body>
        <form class="form">
            <legend class="legend">Ваши личные данные</legend>
            <label class="label" for="name"> Ваше имя </label>
            <input
                class="input"
                type="text"
                name="name"
                id="name"
                placeholder="Имя"
                required
            />
            <label class="label" for="age"> Ваш возраст </label>
            <input
                class="input"
                type="number"
                name="age"
                id="age"
                placeholder="Возраст"
                required
            />
            <label class="label" for="tel"> Ваш номер телефона </label>
            <input
                class="input"
                type="tel"
                name="tel"
                id="tel"
                placeholder="Номер телефона"
                required
            />
            <label class="label" for="email">
                Ваша почта
                
            </label>
            <input
                    class="input"
                    type="email"
                    name="email"
                    id="emal"
                    placeholder="Почта"
                    required
                />
            <label class="label" for="message">
                Сообщение
            </label>
            <textarea
                    class="input textarea"
                    name="message"
                    id="message"
                    placeholder="Ваше сообщение"
                    required
                >
                </textarea>
            <label class="label" for="checkbox">
                <input
                    class="input checkbox"
                    type="checkbox"
                    id="checkbox"
                    name="checkbox"
                    required
                />
                Я принимаю правила
            </label>
            <button class="btn" type="submit">Отправить</button>
        </form>
    </body>
</html>
